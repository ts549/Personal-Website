planning:
  max_iterations: 20
  verify_every_iteration: true
  summarize_every: 5
  retry_limit: 2

execution:
  max_files_per_iteration: 3
  require_reason_before_action: true

verification:
  stop_on_build_failure: false
  require_lint_pass: true

memory:
  keep_last_iterations: 5
  summarize_after: 5