# SCHEMA
# ------
# Each `screen` maps a screen number to a URL. Within a screen, a `section` is
# a scroll-position snapshot: section M = scrolled (M-1) * viewport.height
# pixels down from the top. Section 1 is the top of the page.
#
# Reference images in loop/docs/ MUST be named screen_{N}_section_{M}.png
# (.jpg / .webp / .gif also accepted). Only sections with a matching reference
# image get visually judged; missing references skip the visual check.
#
# `assertions` under a section run after Playwright scrolls to that position.
# `interactions` run as standalone flows after sections — they don't take a
# screenshot, they verify behavior (e.g. clicking a card opens the modal).
#
# The verifier requires EVERY assertion and EVERY interaction to pass AND
# every visual similarity score to be >= 90.

viewport: { width: 1440, height: 900 }

screens:

  - screen: 1
    url: "/"

    sections:
      - section: 1
        # Top of the home page — hero, profile avatar, experience timeline.
        assertions:
          - { type: element_exists, selector: "main h1" }
          - { type: element_exists, selector: "[data-testid=profile-avatar]" }
          - { type: count_at_least, selector: "[data-testid=timeline-item]", min: 4 }

      - section: 2
        # One viewport down — Selected Work grid in view.
        assertions:
          - { type: element_exists, selector: "[data-testid=projects-section]" }
          - { type: count_at_least, selector: "[data-testid=project-card]", min: 4 }

      - section: 3
        # Two viewports down — Writing / blogs section.
        assertions:
          - { type: element_exists, selector: "[data-testid=blogs-section]" }
          - { type: count_at_least, selector: "[data-testid=blog-card]", min: 2 }

    interactions:
      - name: project_modal_opens
        actions:
          - { type: click, selector: "[data-testid=project-card]" }
          - { type: wait_for, selector: "[role=dialog]" }
        assertions:
          - { type: element_exists, selector: "[role=dialog]" }
          - { type: element_exists, selector: "[role=dialog] [aria-label=Close]" }
