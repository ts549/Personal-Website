# Screens are grouped by URL — one entry per route. Each route has one or
# more `views`: a view is the page in a particular state (default, scrolled,
# modal-open, etc.). Each view references the image filename in loop/docs/
# that the verifier compares its captured screenshot against.
#
# A view inherits the screen's `viewport` unless it specifies its own.
#
# The verifier requires for SUCCESS:
#   1. EVERY assertion across EVERY view passes
#   2. EVERY visual similarity score >= 90 (views whose `image` file is
#      missing from loop/docs/ are skipped entirely — neither pass nor fail)
#
# Selectors should use stable hooks (data-testid attributes preferred).

screens:

  - url: "/"
    viewport: { width: 1440, height: 900 }
    views:

      - image: Screen_1.png
        # Default state — page just loaded, no interactions.
        assertions:
          - { type: element_exists, selector: "main h1" }
          - { type: element_exists, selector: "[data-testid=profile-avatar]" }
          - { type: count_at_least, selector: "[data-testid=timeline-item]", min: 4 }
          - { type: count_at_least, selector: "[data-testid=project-card]", min: 1 }

      - image: Screen_2.png
        # Scrolled to the projects grid.
        actions:
          - { type: scroll_to, selector: "[data-testid=projects-section]" }
          - { type: wait_for, selector: "[data-testid=projects-section]" }
        assertions:
          - { type: element_exists, selector: "[data-testid=projects-section]" }
          - { type: count_at_least, selector: "[data-testid=project-card]", min: 4 }

      - image: Screen_3.png
        # Project modal opened by clicking the first project card.
        actions:
          - { type: click, selector: "[data-testid=project-card]" }
          - { type: wait_for, selector: "[role=dialog]" }
        assertions:
          - { type: element_exists, selector: "[role=dialog]" }
          - { type: element_exists, selector: "[role=dialog] [aria-label=Close]" }

      - image: Screen_4.png
        # Scrolled to the resume + blogs sections.
        actions:
          - { type: scroll_to, selector: "[data-testid=resume-section]" }
          - { type: wait_for, selector: "[data-testid=resume-section]" }
        assertions:
          - { type: element_exists, selector: "[data-testid=resume-section]" }
          - { type: element_exists, selector: "[data-testid=blogs-section]" }
          - { type: count_at_least, selector: "[data-testid=blog-card]", min: 2 }
